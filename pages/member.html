<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Place Order – Tayabi Hardware</title>
  <link rel="icon" href="../favicon.svg" type="image/svg+xml"/>
  <link rel="stylesheet" href="../css/main.css"/>
  <link rel="stylesheet" href="../css/member.css"/>
</head>
<body>
<div class="page-layout">
  <nav class="navbar">
    <a href="../index.html" class="navbar-brand">&#128296; Tayabi Hardware</a>
    <span style="color:var(--gray-500);font-size:0.9rem;font-weight:600;">Place Order</span>
  </nav>

  <div class="page-content">

    <!-- STEP 1: SELECT CUSTOMER -->
    <div id="step-customer" class="step-section">
      <h2 style="margin-bottom:16px;">Select Customer</h2>
      <div class="search-bar" style="margin-bottom:12px;">
        <span class="search-icon">🔍</span>
        <input type="search" id="member-customer-search" placeholder="Search customer by name or phone..."/>
      </div>
      <select id="member-city-filter" style="margin-bottom:16px;max-width:220px;">
        <option value="">All Cities</option>
      </select>
      <div id="member-customers-list"></div>
    </div>

    <!-- STEP 2: BUILD ORDER -->
    <div id="step-order" class="step-section hidden">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap;">
        <button class="btn btn-secondary btn-sm" id="btn-change-customer">← Change Customer</button>
        <div>
          <div style="font-weight:700;font-size:1.1rem;" id="order-customer-name">-</div>
          <div style="font-size:0.85rem;color:var(--gray-500);" id="order-customer-info"></div>
        </div>
      </div>

      <div class="card" style="margin-bottom:20px;">
        <div class="search-bar" style="margin-bottom:14px;">
          <span class="search-icon">🔍</span>
          <input type="search" id="member-item-search" placeholder="Search items to add..."/>
        </div>
        <div id="member-items-dropdown" class="member-items-dropdown hidden"></div>
      </div>

      <!-- CART -->
      <div class="card" style="margin-bottom:20px;">
        <div class="section-header" style="margin-bottom:12px;">
          <h3>Order Items</h3>
          <span id="cart-count" class="badge badge-blue">0 items</span>
        </div>
        <div id="cart-items"></div>
      </div>

      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;background:var(--gray-50,#f8fafc);border-radius:10px;padding:10px 14px;">
        <label style="font-size:0.85rem;color:var(--gray-500);white-space:nowrap;margin:0;">🗑 Auto-delete after:</label>
        <select id="order-delete-interval" style="flex:1;font-size:0.9rem;">
          <option value="1">1 day</option>
          <option value="2">2 days</option>
          <option value="3">3 days</option>
          <option value="6" selected>6 days</option>
          <option value="7">7 days</option>
          <option value="14">14 days</option>
          <option value="30">30 days</option>
          <option value="0">Never</option>
        </select>
      </div>
      <button class="btn btn-primary" id="btn-place-order" style="width:100%;padding:16px;font-size:1.1rem;" disabled>Place Order</button>
    </div>
  </div>
</div>

<!-- QTY MODAL -->
<div class="modal-overlay hidden" id="modal-qty">
  <div class="modal-box" style="max-width:360px;">
    <div class="modal-header">
      <h3 id="qty-modal-title">Enter Quantity</h3>
      <button class="modal-close" data-close="modal-qty">&times;</button>
    </div>
    <div style="margin-bottom:14px;">
      <div style="font-size:0.9rem;color:var(--gray-500);margin-bottom:10px;" id="qty-modal-stock"></div>
      <div class="form-group">
        <label>Quantity</label>
        <input type="number" id="qty-input" min="1" placeholder="Enter qty"/>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" data-close="modal-qty">Cancel</button>
      <button class="btn btn-primary" id="btn-confirm-qty">Add to Order</button>
    </div>
  </div>
</div>

<script type="module" src="../js/member.js"></script>
</body>
</html>
